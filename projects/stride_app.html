<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stride Fitness Tracker</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#d4ff00",
            "background-light": "#f8f8f5",
            "background-dark": "#20230f",
            "charcoal": "#171810",
          },
          fontFamily: {
            "display": ["Lexend", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        },
      },
    }
  </script>
  <script src="../js/protection.js"></script>
  <!-- Vercel Insights & Speed Insights -->
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .progress-ring-circle {
      transition: stroke-dashoffset 0.35s;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <script src="../js/protection.js"></script>
  <!-- Vercel Insights & Speed Insights -->
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body class="bg-white font-display text-charcoal antialiased">
  <div
    class="relative mx-auto flex min-h-screen max-w-[430px] flex-col overflow-x-hidden border-x border-slate-100 shadow-2xl">
    <!-- Header -->
    <header class="flex items-center justify-between px-6 pt-8 pb-4">
      <div class="flex size-12 items-center justify-center rounded-full bg-slate-50 text-charcoal">
        <span class="material-symbols-outlined text-2xl">account_circle</span>
      </div>
      <h1 class="text-xl font-bold tracking-tight text-charcoal">Stride</h1>
      <button class="flex size-12 items-center justify-center rounded-full bg-slate-50 text-charcoal">
        <span class="material-symbols-outlined text-2xl">notifications</span>
      </button>
    </header>
    <!-- Progress Ring Section -->
    <section class="flex flex-col items-center justify-center py-8">
      <div class="relative flex items-center justify-center">
        <!-- SVG Ring -->
        <svg class="size-64">
          <circle class="text-slate-100" cx="128" cy="128" fill="transparent" r="110" stroke="currentColor"
            stroke-width="12"></circle>
          <circle class="text-primary progress-ring-circle" cx="128" cy="128" fill="transparent" r="110"
            stroke="currentColor" stroke-dasharray="691" stroke-dashoffset="172" stroke-linecap="round"
            stroke-width="12"></circle>
        </svg>
        <!-- Center Text -->
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-4xl font-extrabold tracking-tight text-charcoal">8,432</span>
          <span class="text-sm font-medium text-slate-500 uppercase tracking-widest">Steps Today</span>
        </div>
      </div>
      <div class="mt-4 flex items-center gap-2 rounded-full bg-slate-50 px-4 py-1.5">
        <span class="material-symbols-outlined text-primary text-sm font-bold">flag</span>
        <span class="text-xs font-semibold text-slate-600">Goal: 10,000</span>
      </div>
    </section>
    <!-- Stats Cards -->
    <section class="grid grid-cols-2 gap-4 px-6">
      <div class="flex flex-col gap-3 rounded-lg border border-slate-100 bg-white p-5 shadow-sm">
        <div class="flex size-10 items-center justify-center rounded-full bg-primary/10 text-charcoal">
          <span class="material-symbols-outlined">local_fire_department</span>
        </div>
        <div>
          <h2 class="text-xl font-bold text-charcoal">1,240</h2>
          <p class="text-sm font-medium text-slate-500">Calories Burned</p>
        </div>
      </div>
      <div class="flex flex-col gap-3 rounded-lg border border-slate-100 bg-white p-5 shadow-sm">
        <div class="flex size-10 items-center justify-center rounded-full bg-primary/10 text-charcoal">
          <span class="material-symbols-outlined">distance</span>
        </div>
        <div>
          <h2 class="text-xl font-bold text-charcoal">5.2</h2>
          <p class="text-sm font-medium text-slate-500">Distance (km)</p>
        </div>
      </div>
    </section>
    <!-- Next Run Section -->
    <section class="px-6 pt-10 pb-24">
      <h2 class="mb-4 text-2xl font-bold tracking-tight text-charcoal">Next Run</h2>
      <div class="group relative overflow-hidden rounded-lg bg-charcoal">
        <img alt="Runner in the city"
          class="h-56 w-full object-cover opacity-60 transition-transform duration-500 group-hover:scale-105"
          data-alt="Athletic runner sprinting on urban street during golden hour"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuAranhp3k1jR6qV7v_MAwwJAlwJY5vOB5cr_d72Aq3_lYzvtL8Sf0YCoMn3fSNfCK53H8F5z01dd1oqptTSgDQd6Nz7I3xh-b7NS4hgldFjNIX59yD30Q8zT1cGNHFN9bioIo8PxuK3Wr9DuQpu9kS2yQeWl2fSk1O79zdkXXGVS3D3-dDpIA6REgc0sHSUWwTuTvMfqIXJOkypsTFk4xdfy1OOGEm1EmRjGRYWCyythiH-my6x7OsJBTX-0EsXn_einkkwkr1Cuh3S" />
        <div class="absolute inset-0 flex flex-col justify-end p-6 bg-gradient-to-t from-charcoal/80 to-transparent">
          <div class="mb-4">
            <h3 class="text-xl font-bold text-white">Morning Trail Run</h3>
            <p class="text-slate-300 text-sm">Tomorrow, 7:00 AM • 45 mins</p>
          </div>
          <button
            class="flex w-full items-center justify-center gap-2 rounded-full bg-primary py-4 text-center text-base font-bold text-charcoal transition-transform active:scale-95">
            <span class="material-symbols-outlined">play_arrow</span>
            Start Run
          </button>
        </div>
      </div>
    </section>
    <!-- Bottom Navigation Bar -->
    <nav
      class="fixed bottom-0 z-50 flex w-full max-w-[430px] border-t border-slate-100 bg-white/90 px-6 pb-6 pt-3 backdrop-blur-lg">
      <a class="flex flex-1 flex-col items-center gap-1 text-charcoal" href="#">
        <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">grid_view</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
      </a>
      <a class="flex flex-1 flex-col items-center gap-1 text-slate-400" href="#">
        <span class="material-symbols-outlined text-2xl">monitoring</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Trends</span>
      </a>
      <div class="flex flex-1 justify-center -mt-8">
        <div
          class="flex size-14 items-center justify-center rounded-full bg-primary text-charcoal shadow-lg shadow-primary/30">
          <span class="material-symbols-outlined text-3xl font-bold">add</span>
        </div>
      </div>
      <a class="flex flex-1 flex-col items-center gap-1 text-slate-400" href="#">
        <span class="material-symbols-outlined text-2xl">explore</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Routes</span>
      </a>
      <a class="flex flex-1 flex-col items-center gap-1 text-slate-400" href="#">
        <span class="material-symbols-outlined text-2xl">person_outline</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Profile</span>
      </a>
    </nav>
  </div>

</body>

</html>

</html>
